_BASE_: "Base-VOC2007.yaml"
DATASETS:
  TRAIN: ("voc_2007_trainval", )
  PROPOSAL_FILES_TRAIN: ("datasets/proposals/voc_2007_trainval_mcg_hgps_proposals_d2.pkl", )
MODEL:
  WEIGHTS: "models/detectron2/ImageNetPretrained/MSRA/V-16.pkl"
  PIXEL_MEAN: [103.939, 116.779, 123.680]
  PIXEL_STD: [1.0, 1.0, 1.0]
  MASK_ON: False
  LOAD_PROPOSALS: True
  BACKBONE:
    NAME: "build_vggnet_backbone"
    FREEZE_AT: 5
  VGGNETS:
    DEPTH: 16
    NORM: ""
  PROPOSAL_GENERATOR:
    NAME: "PrecomputedProposals"
    MIN_SIZE: 20
  ROI_HEADS:
    NAME: "WSBDNROIHeads"
    IN_FEATURES: ["vgg5"]
    NUM_CLASSES: 20
    SCORE_THRESH_TEST: 1e-9
    NMS_THRESH_TEST: 0.5
    PROPOSAL_APPEND_GT: False
    IOU_THRESHOLDS: [0.1, 0.5]
    IOU_LABELS: [-1, 0, 1]
  ROI_BOX_HEAD:
    POOLER_TYPE: "ROIPool"
    POOLER_RESOLUTION: 7
    NAME: "FastRCNNConvFCHead"
    NUM_CONV: 0
    NUM_FC: 2
    FC_DIM: 4096
